# Cấu hình mặc định cho pipeline 3D (MONAI) — Medical Segmentation Decathlon Task06_Lung.
seed: 42

data:
  task: Task06_Lung          # tên task MSD, DecathlonDataset sẽ tự tải về root
  root: data                 # thư mục chứa dữ liệu (ngoài git)
  val_frac: 0.15             # tỉ lệ validation (early stopping)
  test_frac: 0.15            # tỉ lệ test (khóa lại, chỉ báo cáo cuối)
  cache_rate: 1.0            # CacheDataset: 1.0 = cache toàn bộ (cần đủ RAM)
  num_workers: 4             # worker để cache/tiền xử lý ban đầu
  loader_workers: 0          # worker của DataLoader (để 0 trên Windows tránh nhân bản cache)

  # Tiền xử lý thể tích
  spacing: [1.5, 1.5, 2.0]   # resample về spacing (mm) đồng nhất
  a_min: -1000               # HU windowing cho phổi
  a_max: 400
  roi_size: [96, 96, 96]     # kích thước patch 3D
  num_samples: 4             # số patch lấy ngẫu nhiên mỗi volume khi train
  batch_size: 2
  strong_aug: false          # bật aug mạnh (noise/smooth/gamma) — đã thử, hại trên data nhỏ

model:
  name: monai_unet           # monai_unet | swin_unetr
  in_channels: 1
  out_channels: 2            # 0 = nền, 1 = khối u (MSD Task06 gốc)

train:
  max_epochs: 300
  loss: dicefocal            # dicefocal | tversky | dicece (dicefocal đã chứng minh hoạt động)
  lr: 0.0001
  use_scheduler: false       # bật LR scheduler (warmup+cosine) — đã thử, hại trên task này
  warmup_epochs: 5           # warm-up (chỉ dùng khi use_scheduler=true)
  weight_decay: 0.00001
  val_interval: 2            # chạy validation mỗi N epoch
  early_stop_patience: 15    # dừng nếu val-dice không cải thiện sau N lần validate
  early_stop_min_dice: 0.05  # chỉ bật early stopping sau khi dice vượt ngưỡng (thoát collapse)
  amp: true                  # mixed precision
  ckpt_dir: checkpoints
  sw_batch_size: 4           # batch của sliding-window inference
  sw_overlap: 0.5

logging:
  wandb: false               # bật để log lên Weights & Biases
  project: lung-seg
  run_name: null
